name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m compileall -q entrypoint.py src tests
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Build container
        run: docker build -t readme-auto-update:test .
