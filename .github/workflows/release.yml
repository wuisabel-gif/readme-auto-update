name: Release

on:
  push:
    # The job-level SemVer check below is authoritative; this avoids starting
    # runs for the floating v1 tag and for unrelated branch/tag names.
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  # Serialize releases so two v1 releases cannot race while moving the major tag.
  group: readme-auto-update-release
  cancel-in-progress: false

jobs:
  move-v1-tag:
    # Only a v1.x.y release is allowed to move the floating Git major tag.
    # (The action runs from the Dockerfile at the resolved tag; there is no
    # published image to build here.)
    if: github.ref_type == 'tag' && github.ref != 'refs/tags/v1' && startsWith(github.ref_name, 'v1.')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate semantic release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Not a semantic version tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Move floating v1 tag
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          # Push the exact event commit, never the checkout's symbolic ref.
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          git push origin --force "$RELEASE_SHA:refs/tags/v1"
