name: Bug report
description: Report incorrect output or an Action failure.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve README Auto Update. Remove secrets before sharing logs.
  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options: [auto, ai, rules]
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Minimal workflow
      render: yaml
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact tokens, private repository content, and personal information.
      render: text

